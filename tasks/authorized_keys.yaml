---
- name: KEYS | Register users home directories # registers getent_passwd variable
  ansible.builtin.getent:
    database: passwd

- name: KEYS | Ensure SSH authorized keys are present
  ansible.posix.authorized_key:
    user: "{{ item.0.name }}"
    key: "{{ item.1 }}"
    state: present
  loop: "{{ anro_server_authorized_keys | subelements('authorized_keys') }}"
  no_log: true
  when:
    - getent_passwd[item.0.name][4] is defined
    - item.0.authorized_keys is defined
    - item.0.authorized_keys | length > 0

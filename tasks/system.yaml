---
- name: SYSTEM | Set system hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: SYSTEM | Lower VM swappiness
  ansible.posix.sysctl:
    name: vm.swappiness
    value: '0'
    state: present

- name: SYSTEM | Set timezone to {{ anro_server_timezone }}
  community.general.timezone:
    name: "{{ anro_server_timezone }}"

- name: SYSTEM | Check if systemd-timesyncd is enabled
  ansible.builtin.debug:
    msg: "{{ ansible_facts['services']['systemd-timesyncd.service']['status'] }}"
  register: timesyncd_enabled
  changed_when: false
  failed_when: false

- name: SYSTEM | Set timesyncd ntp servers to "{{ anro_server_time_server }}"
  ansible.builtin.lineinfile:
    dest: /etc/systemd/timesyncd.conf
    state: present
    regexp: '^#?NTP=.*'
    line: "NTP={{ anro_server_time_server }}"
  notify: Restart timesyncd
  when: timesyncd_enabled.msg == 'enabled'
